let lang='ar', active='all', query='';
const fmt=n=>Number(n).toLocaleString('en-US');
const labels={ar:{all:'الكل',search:'ابحث في القائمة...',items:'صنف',no:'لا توجد نتائج',try:'جرّب كلمة بحث أخرى',iqd:'د.ع',half:'نصف',full:'كامل',small:'صغير',medium:'وسط',large:'كبير',chicken:'دجاج',meat:'لحم'},en:{all:'All',search:'Search the menu...',items:'items',no:'No results found',try:'Try another search term',iqd:'IQD',half:'Half',full:'Full',small:'Small',medium:'Medium',large:'Large',chicken:'Chicken',meat:'Meat'}};
function renderCategories(){const nav=document.getElementById('categories');nav.innerHTML=`<button class="chip ${active==='all'?'active':''}" data-id="all">${labels[lang].all}</button>`+menuData.map(s=>`<button class="chip ${active===s.id?'active':''}" data-id="${s.id}">${s[lang]}</button>`).join('');nav.querySelectorAll('button').forEach((b,i)=>{b.style.animationDelay=(i*0.04)+'s';b.onclick=()=>{if(active===b.dataset.id)return;active=b.dataset.id;render();if(active!=='all')setTimeout(()=>document.getElementById(active)?.scrollIntoView({behavior:'smooth'}),30)}});}
let revealObserver;
function observeItems(){const targets=document.querySelectorAll('.section,.item');if(!('IntersectionObserver' in window)){targets.forEach(el=>el.classList.add('in'));return}if(revealObserver)revealObserver.disconnect();revealObserver=new IntersectionObserver((entries)=>{entries.forEach(en=>{if(en.isIntersecting){en.target.classList.add('in');revealObserver.unobserve(en.target)}})},{threshold:.1,rootMargin:'0px 0px -34px 0px'});targets.forEach(el=>revealObserver.observe(el))}
function match(item,s){const q=query.trim().toLowerCase();return !q||item[0].toLowerCase().includes(q)||item[1].toLowerCase().includes(q)||s.ar.includes(q)||s.en.toLowerCase().includes(q)}
function priceHTML(p){if(typeof p==='object')return `<div class="dual-price">${Object.entries(p).map(([size,value])=>`<span><b>${fmt(value)}</b><small>${labels[lang][size]||size}</small></span>`).join('')}</div>`;return `<div class="price">${fmt(p)}<small>${labels[lang].iqd}</small></div>`}
function render(){renderCategories();let total=0;const sections=menuData.filter(s=>active==='all'||s.id===active).map((s,i)=>{const items=s.items.filter(x=>match(x,s));total+=items.length;if(!items.length)return '';return `<section class="section" id="${s.id}"><div class="section-head"><h2 class="section-title">${s[lang]}<small>${s[lang==='ar'?'en':'ar']}</small></h2><span class="section-number">${String(i+1).padStart(2,'0')}</span></div><div class="items">${items.map(x=>`<article class="item"><div class="item-main"><div class="item-ar">${x[lang==='ar'?0:1]}</div><div class="item-en">${x[lang==='ar'?1:0]}</div></div>${priceHTML(x[2])}</article>`).join('')}</div></section>`}).join('');const menuEl=document.getElementById('menu');menuEl.style.opacity='0';menuEl.style.transform='translateY(6px)';setTimeout(()=>{menuEl.innerHTML=sections||`<div class="empty"><strong>${labels[lang].no}</strong>${labels[lang].try}</div>`;menuEl.style.transition='opacity .28s ease,transform .28s ease';menuEl.style.opacity='1';menuEl.style.transform='translateY(0)';observeItems()},sections?90:0);document.getElementById('count').textContent=`${total} ${labels[lang].items}`;}
function setLang(l){lang=l;document.documentElement.lang=l;document.documentElement.dir=l==='ar'?'rtl':'ltr';document.querySelectorAll('.lang button').forEach(b=>b.classList.toggle('active',b.dataset.lang===l));document.querySelectorAll('[data-ar]').forEach(el=>el.textContent=el.dataset[l]);document.getElementById('search').placeholder=labels[l].search;render();localStorage.setItem('abo-hammoudi-lang',l)}
document.querySelectorAll('.lang button').forEach(b=>b.onclick=()=>setLang(b.dataset.lang));document.getElementById('search').oninput=e=>{query=e.target.value;render()};function toast(t){const el=document.getElementById('toast');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1800)}
const sourceLogo=document.querySelector('.seal img');if(sourceLogo){sourceLogo.alt='Abu Hamoudi Al-Souri logo'}const intro=document.getElementById('intro'),introCoin=document.getElementById('introCoin'),introCoinFront=document.getElementById('introCoinFront'),introCoinBack=document.getElementById('introCoinBack'),coinStack=document.getElementById('coinStack'),introRing=document.querySelector('.intro-ring circle'),introWords=document.querySelector('.intro-slogan');if(sourceLogo){introCoinFront.src=sourceLogo.src;introCoinBack.src=sourceLogo.src}for(let z=-8;z<=8;z++){const layer=document.createElement('span');layer.style.transform=`translateZ(${z}px)`;coinStack.appendChild(layer)}let introTimers=[],introEnded=false;function cleanIntro(){if(introEnded)return;introEnded=true;introTimers.forEach(clearTimeout);intro.remove();document.body.classList.remove('intro-running','intro-reveal')}function finishIntro(fast=false){if(introEnded)return;introTimers.forEach(clearTimeout);document.body.classList.add('intro-reveal');intro.classList.add('exit');if(intro.animate)intro.animate([{opacity:1},{opacity:0}],{duration:fast?280:700,easing:'ease',fill:'forwards'});else intro.style.opacity='0';introTimers.push(setTimeout(cleanIntro,fast?300:730))}function playIntro(){if(!intro.animate)return;introRing.style.animation='none';introCoin.style.animation='none';introWords.style.animation='none';introRing.animate([{strokeDashoffset:604},{strokeDashoffset:0}],{duration:800,delay:80,easing:'cubic-bezier(.65,0,.35,1)',fill:'forwards'});introCoin.animate([{opacity:0,transform:'translateY(38px) scale(.48) rotateX(24deg) rotateY(-540deg)'},{opacity:1,transform:'translateY(-6px) scale(1.09) rotateX(5deg) rotateY(-20deg)',offset:.76},{opacity:1,transform:'translateY(0) scale(1) rotateX(0deg) rotateY(0deg)'}],{duration:1200,delay:300,easing:'cubic-bezier(.16,1,.3,1)',fill:'forwards'});introWords.animate([{opacity:0,transform:'translateY(10px)'},{opacity:1,transform:'translateY(0)'}],{duration:480,delay:1380,easing:'ease-out',fill:'forwards'})}document.getElementById('introSkip').onclick=()=>finishIntro(true);playIntro();introTimers.push(setTimeout(()=>{document.body.classList.add('intro-reveal');intro.classList.add('exit');if(intro.animate)intro.animate([{opacity:1},{opacity:0}],{duration:700,easing:'ease',fill:'forwards'});else intro.style.opacity='0'},2200));introTimers.push(setTimeout(cleanIntro,2950));
setLang(localStorage.getItem('abo-hammoudi-lang')||'ar');
const tb=document.querySelector('.toolbar');window.addEventListener('scroll',()=>tb.classList.toggle('scrolled',window.scrollY>8),{passive:true});
